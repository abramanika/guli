<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body { margin: 0; padding: 20px; }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { TabBar, Icon, TRAITS } = window.GuliDesignSystem_a2088d;
function Demo() {
  const [tab, setTab] = React.useState('map');
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
      <div style={{ maxWidth: 390, border: '1px solid var(--line-hairline)', borderRadius: 12, overflow: 'hidden' }}>
        <TabBar active={tab} onChange={setTab} />
      </div>
      <div style={{ display: 'flex', gap: 20, alignItems: 'center' }}>
        {Object.keys(TRAITS).map((k) => (
          <span key={k} style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
            <Icon name={TRAITS[k].icon} size={22} color={TRAITS[k].hex} />
            <span className="type-caption" style={{ color: 'var(--text-secondary)' }}>{TRAITS[k].ka}</span>
          </span>
        ))}
        <Icon name="droplet" size={22} color="var(--saperavi-tint)" />
        <Icon name="qr-code" size={22} color="var(--text-secondary)" />
        <Icon name="share" size={22} color="var(--text-secondary)" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
