<div id="root"></div>
<script type="text/babel">
const { InsightCard, ArchetypeCard, DailyQuestionCard, ScenarioSlider } = window.GuliDesignSystem_a2088d;
function Demo() {
  const [v, setV] = React.useState(40);
  return (
    <div style={{ display: 'flex', gap: 16, alignItems: 'flex-start' }}>
      <div style={{ flex: 1.2, display: 'flex', flexDirection: 'column', gap: 12 }}>
        <DailyQuestionCard question="გეგმა მირჩევნია იმპროვიზაციას." traits={['C', 'O']}>
          <ScenarioSlider poleLeft="სრულიად არა" poleRight="სრულიად კი" value={v} onChange={setV} trait="C" />

        <InsightCard title="შენი ენერგია" trait="E" label="კვლევითი საფუძველი">

        <DailyQuestionCard answered countdown="შემდეგი კითხვა ხვალ, 09:00" />
      </div>
      <ArchetypeCard
        style={{ flex: 1 }}
        name="მასპინძელი"
        tagline="შენ ის ხარ, ვინც სუფრას ერთი კითხვით ცვლის."

}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
