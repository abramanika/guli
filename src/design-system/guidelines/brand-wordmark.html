<!DOCTYPE html>
<html lang="ka">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>

<body>
<div style="display: flex; flex-direction: column; gap: 4px;">
  <span style="font: 600 56px/1.1 var(--font-ui); color: var(--text-primary);">გული</span>
  <span style="font: 600 15px/1 var(--font-ui); letter-spacing: 0.02em; color: var(--text-secondary);">GULI</span>
