<!DOCTYPE html>
<html lang="ka">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; padding: 16px; display: flex; gap: 12px; align-items: stretch; }
.sw { flex: 1; border-radius: 16px; padding: 12px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-end; }
.sw span { font: 500 11px/16px var(--font-ui); color: #F5EDF1; }
.sw code { font: 400 10px/14px monospace; color: rgba(245,237,241,0.7); }
.use { flex: 1.4; border-radius: 16px; background: var(--bg-1); border: 1px solid var(--line-hairline); display: flex; align-items: center; justify-content: center; gap: 10px; }
</style></head>
<body>
<div class="sw" style="background: var(--saperavi);"><span>brand/saperavi</span><code>#A62A54</code></div>
<div class="sw" style="background: var(--saperavi-deep);"><span>saperavi-deep · pressed</span><code>#6E1B38</code></div>
<div class="sw" style="background: var(--bg-1); border: 1px solid var(--line-hairline);"><span style="color: var(--saperavi-tint);">saperavi-tint · ტექსტი</span><code>#E88BAB</code></div>
<div class="use">
  <button style="height: 40px; padding: 0 20px; border: none; border-radius: 999px; background: var(--saperavi); color: #F5EDF1; font: 500 14px/1 var(--font-ui);">გაგრძელება</button>
  <a href="#" style="font: 400 13px/1 var(--font-ui);">ბმული</a>
</div>
</body>
</html>
