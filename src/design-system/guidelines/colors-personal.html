<!DOCTYPE html>
<html lang="ka">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; padding: 16px; display: flex; gap: 12px; }
.cell { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 10px 0; }
.blob { width: 76px; height: 76px; }
.cell span { font: 500 11px/16px var(--font-ui); color: var(--text-secondary); }
</style></head>
<body>
<div class="cell"><div class="blob" style="border-radius: 58% 42% 55% 45% / 52% 58% 42% 48%; background: radial-gradient(120% 120% at 32% 28%, #F0736A 38%, #4FA3F7);"></div><span>თბილი ცა</span></div>
<div class="cell"><div class="blob" style="border-radius: 45% 55% 60% 40% / 55% 45% 55% 45%; transform: rotate(47deg); background: radial-gradient(120% 120% at 32% 28%, #9C7BF5 38%, #F2A93B);"></div><span>მშვიდი თაფლი</span></div>
<div class="cell"><div class="blob" style="border-radius: 62% 38% 48% 52% / 44% 60% 40% 56%; transform: rotate(94deg); background: radial-gradient(120% 120% at 32% 28%, #F2A93B 38%, #F0736A);"></div><span>თბილი თაფლი</span></div>
<div class="cell"><div class="blob" style="border-radius: 50% 50% 42% 58% / 60% 42% 58% 40%; transform: rotate(141deg); background: radial-gradient(120% 120% at 32% 28%, #35C4B5 38%, #4FA3F7);"></div><span>ღია მინანქარი</span></div>
<div class="cell"><div class="blob" style="border-radius: 40% 60% 52% 48% / 48% 52% 62% 38%; transform: rotate(188deg); background: radial-gradient(120% 120% at 32% 28%, #4FA3F7 38%, #9C7BF5);"></div><span>მაძიებელი ია</span></div>
<div class="cell"><div class="blob" style="border-radius: 58% 42% 55% 45% / 52% 58% 42% 48%; transform: rotate(235deg); background: radial-gradient(120% 120% at 32% 28%, #F0736A 38%, #35C4B5);"></div><span>თბილი მინანქარი</span></div>
</body>
</html>
