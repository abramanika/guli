<!DOCTYPE html>
<html lang="ka">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; padding: 16px; display: flex; gap: 12px; }
.sw { flex: 1; height: 118px; border-radius: 16px; border: 1px solid var(--line-hairline); padding: 12px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-end; gap: 2px; }
.sw span { font: 500 11px/16px var(--font-ui); color: var(--text-secondary); }
.sw code { font: 400 10px/14px monospace; color: var(--text-muted); }
</style></head>
<body>
<div class="sw" style="background: var(--bg-0);"><span>bg/0 · ფონი</span><code>#120B10</code></div>
<div class="sw" style="background: var(--bg-1);"><span>bg/1 · ბარათები</span><code>#1C1218</code></div>
<div class="sw" style="background: var(--bg-2);"><span>bg/2 · აწეული</span><code>#271A22</code></div>
<div class="sw" style="background: var(--bg-1);"><span style="color: var(--text-primary);">text/primary</span><span>text/secondary</span><code style="color: var(--text-muted);">text/muted · hairline 8%</code></div>
</body>
</html>
