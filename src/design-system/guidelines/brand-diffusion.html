<!DOCTYPE html>
<html lang="ka">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; padding: 16px; display: flex; gap: 12px; align-items: center; justify-content: center; height: 208px; box-sizing: border-box; }
.stage { position: relative; flex: 1; height: 100%; border-radius: 16px; background: var(--bg-0); border: 1px solid var(--line-hairline); overflow: hidden; display: flex; align-items: center; justify-content: center; }
.blob { width: 120px; height: 120px; border-radius: 58% 42% 55% 45% / 52% 58% 42% 48%; background: radial-gradient(120% 120% at 32% 28%, #A62A54 30%, #6E1B38); filter: blur(2px); }
@media (prefers-reduced-motion: no-preference) {
  .blob { animation: diffuse 3.2s cubic-bezier(0.16, 1, 0.3, 1) infinite; }
  @keyframes diffuse {
    0% { transform: scale(0.1) rotate(-20deg); opacity: 0; filter: blur(28px); }
    18% { opacity: 0.9; }
    38%, 82% { transform: scale(1) rotate(0deg); opacity: 1; filter: blur(2px); }
    100% { transform: scale(1); opacity: 0; filter: blur(16px); }
  }
}
.note { flex: 1.1; display: flex; flex-direction: column; gap: 8px; padding: 0 8px; }
.note span { font: 400 12px/19px var(--font-ui); color: var(--text-secondary); }
.note b { font: 500 13px/19px var(--font-ui); color: var(--text-primary); }
</style></head>
<body>
<div class="stage"><div class="blob"></div></div>
<div class="note">
  <b>წესები</b>
  <span>· 600ms, ease-out, მსუბუქი ტურბულენცია</span>
  <span>· ერთი დიფუზია თითო ნაკადში — მხოლოდ შედეგის გამოცხადებაზე</span>
  <span>· ჩვეულებრივი გადასვლები: 240ms fade/slide</span>
  <span>· reduced-motion: 300ms crossfade</span>
</div>
</body>
</html>
