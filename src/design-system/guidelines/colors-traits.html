<!DOCTYPE html>
<html lang="ka">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; padding: 16px; display: flex; gap: 12px; }
.sw { flex: 1; height: 138px; border-radius: 16px; padding: 12px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }
.drop { width: 16px; height: 16px; transform: rotate(45deg); border-radius: 50% 50% 50% 4px; background: rgba(18,11,16,0.4); }
.sw b { font: 600 13px/18px var(--font-ui); color: #120B10; }
.sw i { font-style: normal; font: 500 10px/14px var(--font-ui); color: rgba(18,11,16,0.65); display: block; }
</style></head>
<body>
<div class="sw" style="background: var(--trait-e);"><span class="drop"></span><div><b>თაფლი</b><i>Extraversion · #F2A93B</i></div></div>
<div class="sw" style="background: var(--trait-a);"><span class="drop"></span><div><b>ატამი</b><i>Agreeableness · #F0736A</i></div></div>
<div class="sw" style="background: var(--trait-c);"><span class="drop"></span><div><b>მინანქარი</b><i>Conscientiousness · #35C4B5</i></div></div>
<div class="sw" style="background: var(--trait-n);"><span class="drop"></span><div><b>ია</b><i>Emotional range · #9C7BF5</i></div></div>
<div class="sw" style="background: var(--trait-o);"><span class="drop"></span><div><b>ცა</b><i>Openness · #4FA3F7</i></div></div>
</body>
</html>
