<!-- @dsCard group="Colors" viewport="700x150" name="Light theme — ეტრატი" subtitle="Secondary parchment theme; hero screens stay dark" -->
<!DOCTYPE html>
<html lang="ka" data-theme="light">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; padding: 16px; display: flex; gap: 12px; background: var(--bg-0); }
.sw { flex: 1; height: 118px; border-radius: 16px; border: 1px solid var(--line-hairline); padding: 12px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-end; gap: 2px; }
.sw span { font: 500 11px/16px var(--font-ui); color: var(--text-secondary); }
.sw code { font: 400 10px/14px monospace; color: var(--text-muted); }
</style></head>
<body>
<div class="sw" style="background: var(--bg-0);"><span>bg · ეტრატი</span><code>#FAF5F2</code></div>
<div class="sw" style="background: var(--bg-1);"><span style="color: var(--text-primary);">text #241A20</span><code>surface #FFFFFF</code></div>
<div class="sw" style="background: var(--saperavi);"><span style="color: #FAF5F2;">saperavi (light)</span><code style="color: rgba(250,245,242,0.75);">#8E2347</code></div>
<div class="sw" style="background: var(--bg-1); align-items: flex-start; flex-direction: row; align-items: flex-end; gap: 6px;">
  <span class="dot" style="width: 22px; height: 22px; border-radius: 999px; background: var(--trait-e);"></span>
  <span style="width: 22px; height: 22px; border-radius: 999px; background: var(--trait-a);"></span>
  <span style="width: 22px; height: 22px; border-radius: 999px; background: var(--trait-c);"></span>
  <span style="width: 22px; height: 22px; border-radius: 999px; background: var(--trait-n);"></span>
  <span style="width: 22px; height: 22px; border-radius: 999px; background: var(--trait-o);"></span>
</div>
</body>
</html>
