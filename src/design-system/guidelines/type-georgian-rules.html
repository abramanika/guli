<!DOCTYPE html>
<html lang="ka">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.rule { background: var(--bg-1); border: 1px solid var(--line-hairline); border-radius: 12px; padding: 12px 14px; display: flex; flex-direction: column; gap: 4px; }
.rule b { font: 500 12px/18px var(--font-ui); color: var(--text-primary); }
.rule span { font: 400 11px/17px var(--font-ui); color: var(--text-secondary); }
.ok { color: var(--trait-c); } .no { color: var(--error); }
</style></head>
<body>
<div class="rule"><b>ტრეკინგი ქართულზე = 0, ყოველთვის</b><span><i class="ok">✓</i> გულღია &nbsp;&nbsp;<i class="no">✗</i> <span style="letter-spacing: 0.15em;">გულღია</span></span></div>
<div class="rule"><b>Mtavruli მხოლოდ ≤2-სიტყვიან ღილაკებზე</b><span><i class="ok">✓</i> ᲓᲐᲘᲬᲧᲔ &nbsp;&nbsp;<i class="no">✗</i> ᲡᲐᲗᲐᲣᲠᲔᲑᲘ ᲓᲐ ᲢᲔᲥᲡᲢᲘ ᲐᲡᲔ</span></div>
<div class="rule"><b>ხაზთაშორისი ≥ 1.5 ტანის ტექსტზე</b><span>წ, ღ, ჭ, კ — მაღალი ასოები იჯახება მჭიდრო ლიდინგზე</span></div>
<div class="rule"><b>სტრიქონი ≤ ~34 ასო</b><span>ქართული ინგლისურზე ~15–25%-ით გრძელია — ღილაკები იზრდება, არასდროს იჭრება</span></div>
</body>
</html>
