<!DOCTYPE html>
<html lang="ka">
<head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
body { margin: 0; padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.ex { border-radius: 16px; padding: 16px; display: flex; flex-direction: column; gap: 8px; background: var(--bg-1); border: 1px solid var(--line-hairline); }
.ex .tag { font: 500 11px/16px var(--font-ui); }
.ex p { margin: 0; font: 400 14px/22px var(--font-ui); color: var(--text-primary); }
.rules { grid-column: 1 / -1; font: 400 11px/18px var(--font-ui); color: var(--text-secondary); display: flex; gap: 18px; flex-wrap: wrap; }
</style></head>
<body>
<div class="ex" style="border-color: rgba(53,196,181,0.4);">
  <span class="tag" style="color: var(--trait-c);">✓ თბილი სიზუსტე</span>
  <p>ხალხთან ყოფნა გმუხტავს, მაგრამ დღეში ერთი მშვიდი საათი შენთვის აუცილებელია.</p>
</div>
<div class="ex" style="border-color: rgba(255,84,112,0.4);">
  <span class="tag" style="color: var(--error);">✗ არასდროს ასე</span>
  <p style="color: var(--text-muted);">შენ დღეს კოსმიური ენერგია გელოდება! ✨</p>
</div>
<div class="rules">
  <span>· ყოველთვის შენ, არასდროს თქვენ</span>
  <span>· ძახილის ნიშანი მხოლოდ ზეიმზე, ერთი</span>
  <span>· კვლევითი საფუძველი / სახალისო — ყოველთვის მონიშნული</span>
  <span>· ემოჯი არასდროს UI-ში</span>
</div>
</body>
</html>
